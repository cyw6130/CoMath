<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Skill Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;color:#2d3748;min-height:100vh}
/* ── layout ── */
.header{padding:20px 28px 14px;border-bottom:1px solid #d1dce8;background:#fff}
.header h1{font-size:20px;font-weight:600;color:#1a202c}
.header p{font-size:12px;color:#718096;margin-top:3px}
.tabs{display:flex;gap:2px;padding:0 28px;background:#f7fafc;border-bottom:1px solid #d1dce8}
.tab{padding:10px 16px;font-size:13px;color:#a0aec0;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab:hover{color:#4a5568}
.tab.active{color:#3b82f6;border-bottom-color:#3b82f6}
.pane{display:none}.pane.active{display:block}
/* ── overview ── */
.ov-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;padding:20px 28px}
.kpi{background:#fff;border:1px solid #d1dce8;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.kpi-val{font-size:26px;font-weight:700;color:#3b82f6}
.kpi-lbl{font-size:12px;color:#718096;margin-top:4px}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:0 28px 24px}
.chart-box{background:#fff;border:1px solid #d1dce8;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.chart-box h3{font-size:13px;color:#4a5568;margin-bottom:12px;font-weight:600}
/* bar chart */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-label{width:170px;font-size:11px;color:#4a5568;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.bar-track{flex:1;background:#e2e8f0;border-radius:3px;height:14px;position:relative}
.bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#2563eb,#60a5fa)}
.bar-num{font-size:11px;color:#718096;min-width:44px;text-align:right}
/* donut */
.donut-wrap{display:flex;align-items:center;gap:20px;padding:8px 0}
.legend{flex:1}
.leg-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.leg-name{color:#4a5568;flex:1}
.leg-cnt{color:#718096}
/* tier chart */
.tier-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.tier-name{width:40px;font-size:12px;color:#4a5568}
.tier-bar{flex:1;background:#e2e8f0;border-radius:3px;height:18px;position:relative}
.tier-fill{height:100%;border-radius:3px}
.tier-cnt{font-size:12px;color:#718096;min-width:50px}
/* ── table tab ── */
.controls{display:flex;gap:10px;padding:14px 28px;flex-wrap:wrap;border-bottom:1px solid #d1dce8;background:#f7fafc}
.search{flex:1;min-width:180px;padding:7px 11px;border-radius:6px;border:1px solid #cbd5e0;background:#fff;color:#2d3748;font-size:13px}
.search:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 2px #bfdbfe}
select{padding:7px 11px;border-radius:6px;border:1px solid #cbd5e0;background:#fff;color:#2d3748;font-size:13px;cursor:pointer}
.filter-btn{padding:6px 12px;border-radius:6px;border:1px solid #cbd5e0;background:#fff;color:#718096;font-size:12px;cursor:pointer}
.filter-btn.active{background:#dbeafe;border-color:#3b82f6;color:#2563eb}
.stat-bar{display:flex;gap:20px;padding:10px 28px;background:#f7fafc;border-bottom:1px solid #d1dce8;font-size:12px;color:#718096}
.stat-bar span{color:#4a5568;font-weight:500}
table{width:100%;border-collapse:collapse;font-size:13px}
.tbl-wrap{padding:0 28px 32px;overflow-x:auto}
th{text-align:left;padding:9px 10px;color:#718096;font-weight:600;border-bottom:1px solid #d1dce8;white-space:nowrap;cursor:pointer;user-select:none;background:#f7fafc}
th:hover{color:#2d3748}
tr:hover td{background:#f0f7ff}
td{padding:9px 10px;border-bottom:1px solid #e2e8f0;vertical-align:middle}
.name{font-family:monospace;font-size:12px;color:#2563eb;font-weight:500}
.desc{color:#718096;max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.cat-badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:500}
.tier-badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:600}
.tier-核心{background:#dcfce7;color:#16a34a}
.tier-常用{background:#dbeafe;color:#1d4ed8}
.tier-备用{background:#fef9c3;color:#a16207}
.tier-未用{background:#f1f5f9;color:#94a3b8}
.usage-wrap{display:flex;align-items:center;gap:6px}
.u-bar{height:5px;border-radius:3px;background:#e2e8f0;min-width:2px}
.u-fill{height:100%;border-radius:3px;background:#3b82f6}
.u-num{font-size:11px;color:#718096;min-width:36px;text-align:right}
.date{font-size:11px;color:#a0aec0;white-space:nowrap}
.no-res{text-align:center;color:#a0aec0;padding:48px;font-size:14px}
/* ── workflow tab ── */
.wf-wrap{padding:20px 28px}
.wf-title{font-size:14px;font-weight:600;color:#4a5568;margin:20px 0 10px}
.wf-title:first-child{margin-top:0}
.wf-flow{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.wf-skill{background:#f7fafc;border:1px solid #d1dce8;border-radius:6px;padding:5px 10px;font-size:12px;font-family:monospace;color:#2563eb;white-space:nowrap;cursor:pointer}
.wf-skill:hover{background:#eff6ff;border-color:#93c5fd}
.wf-skill.hot{border-color:#3b82f6;background:#eff6ff;font-weight:600}
.wf-arrow{color:#cbd5e0;font-size:14px}
.wf-label{font-size:11px;color:#475569;margin-bottom:4px}
</style>
</head>
<body>

<div class="header">
  <h1>Claude Code · Skill Manager</h1>
  <p>220 Skills · 可视化管理 · 按调用次数 / 分类 / 频率分层</p>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('overview')">概览</div>
  <div class="tab" onclick="showTab('table')">技能列表</div>
  <div class="tab" onclick="showTab('workflow')">工作流</div>
</div>

<!-- ══════════════════════════════ OVERVIEW ════════════════════════════════ -->
<div class="pane active" id="pane-overview">
  <div class="ov-grid" id="kpi-grid"></div>
  <div class="charts-row">
    <div class="chart-box">
      <h3>Top 20 Skills · 调用次数</h3>
      <div id="bar-chart"></div>
    </div>
    <div class="chart-box">
      <h3>功能分类分布</h3>
      <div class="donut-wrap">
        <svg id="donut" width="130" height="130" viewBox="0 0 130 130"></svg>
        <div class="legend" id="donut-legend"></div>
      </div>
      <h3 style="margin-top:20px">使用频率分层</h3>
      <div id="tier-chart"></div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════ TABLE ══════════════════════════════════ -->
<div class="pane" id="pane-table">
  <div class="controls">
    <input class="search" id="search" placeholder="搜索名称或描述…" oninput="render()">
    <select id="sort" onchange="render()">
      <option value="usage">按调用次数</option>
      <option value="updated">按更新时间</option>
      <option value="created">按创建时间</option>
      <option value="last_used">按最近调用</option>
      <option value="name">按名称</option>
    </select>
    <select id="dir" onchange="render()">
      <option value="desc">降序</option>
      <option value="asc">升序</option>
    </select>
    <select id="cat-filter" onchange="render()">
      <option value="">全部分类</option>
      <option value="其他">其他</option>
<option value="发布/输出">发布/输出</option>
<option value="知识整合">知识整合</option>
<option value="笔记整理">笔记整理</option>
<option value="资源获取">资源获取</option>
    </select>
    <select id="tier-filter" onchange="render()">
      <option value="">全部层级</option>
      <option value="核心">🔥 核心 (&gt;500)</option>
      <option value="常用">📌 常用 (100-500)</option>
      <option value="备用">💤 备用 (&lt;100)</option>
      <option value="未用">⬜ 未用</option>
    </select>
  </div>
  <div class="stat-bar" id="stat-bar"></div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th onclick="setSort('name')">名称</th>
        <th>描述</th>
        <th>分类</th>
        <th onclick="setSort('usage')">调用次数 ↕</th>
        <th onclick="setSort('last_used')">最近调用 ↕</th>
        <th onclick="setSort('updated')">更新时间 ↕</th>
        <th>层级</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="no-res" id="no-res" style="display:none">没有匹配结果</div>
  </div>
</div>

<!-- ══════════════════════════════ WORKFLOW ═══════════════════════════════ -->
<div class="pane" id="pane-workflow">
  <div class="wf-wrap" id="wf-content"></div>
</div>

  "知识整合":  "#8b5cf6",

// ── Tabs ──
function showTab(id) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['overview','table','workflow'][i]===id));
  document.querySelectorAll('.pane').forEach(p => p.classList.toggle('active', p.id==='pane-'+id));

// ════════════════════ OVERVIEW ════════════════════
function buildOverview() {
  const total   = SKILLS.length;
  const withUse = SKILLS.filter(s=>s.usage>0).length;
  const total_u = SKILLS.reduce((a,s)=>a+s.usage,0);
  const core    = SKILLS.filter(s=>s.tier==='核心').length;
  document.getElementById('kpi-grid').innerHTML = `
    <div class="kpi"><div class="kpi-val">${total}</div><div class="kpi-lbl">Skills 总数</div></div>
    <div class="kpi"><div class="kpi-val">${withUse}</div><div class="kpi-lbl">有使用记录</div></div>
    <div class="kpi"><div class="kpi-val">${core}</div><div class="kpi-lbl">核心 Skills（>500次）</div></div>
    <div class="kpi"><div class="kpi-val">${total_u.toLocaleString()}</div><div class="kpi-lbl">总调用次数</div></div>
  `;

  // Bar chart
  const maxBar = TOP20[0]?.usage || 1;
  document.getElementById('bar-chart').innerHTML = TOP20.map(s => `
    <div class="bar-row">
      <span class="bar-label">${s.name}</span>
      <div class="bar-track">
        <div class="bar-fill" style="width:${Math.round(s.usage/maxBar*100)}%"></div>
      </div>
      <span class="bar-num">${s.usage.toLocaleString()}</span>
    </div>`).join('');

  // Donut
  const catMap = {};
  SKILLS.forEach(s => { catMap[s.category]=(catMap[s.category]||0)+1; });
  const cats = Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const totalCats = cats.reduce((a,c)=>a+c[1],0);
  let angle = -90, paths = '', legend = '';
  cats.forEach(([cat, cnt]) => {
    const pct = cnt/totalCats;
    const a1 = angle * Math.PI/180;
    const a2 = (angle + pct*360) * Math.PI/180;
    const cx=65, cy=65, r=48, ri=28;
    const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
    const x2=cx+r*Math.cos(a2), y2=cy+r*Math.sin(a2);
    const xi1=cx+ri*Math.cos(a1),yi1=cy+ri*Math.sin(a1);
    const xi2=cx+ri*Math.cos(a2),yi2=cy+ri*Math.sin(a2);
    const lg = pct>0.5?1:0;
    const color = CAT_COLORS[cat]||'#475569';
    paths += `<path d="M${xi1},${yi1} L${x1},${y1} A${r},${r} 0 ${lg},1 ${x2},${y2} L${xi2},${yi2} A${ri},${ri} 0 ${lg},0 ${xi1},${yi1} Z" fill="${color}" opacity="0.85"/>`;
    legend += `<div class="leg-row"><div class="leg-dot" style="background:${color}"></div><span class="leg-name">${cat}</span><span class="leg-cnt">${cnt}</span></div>`;
    angle += pct*360;
  });
  document.getElementById('donut').innerHTML = paths;
  document.getElementById('donut-legend').innerHTML = legend;

  // Tier chart
  const tiers = [['核心','#4ade80'],['常用','#60a5fa'],['备用','#fbbf24'],['未用','#374151']];
  const tierMap = {};
  SKILLS.forEach(s=>{ tierMap[s.tier]=(tierMap[s.tier]||0)+1; });
  const maxT = Math.max(...Object.values(tierMap));
  document.getElementById('tier-chart').innerHTML = tiers.map(([t,c])=>`
    <div class="tier-row">
      <span class="tier-name">${t}</span>
      <div class="tier-bar">
        <div class="tier-fill" style="width:${Math.round((tierMap[t]||0)/maxT*100)}%;background:${c};opacity:0.7"></div>
      </div>
      <span class="tier-cnt">${tierMap[t]||0} 个</span>
    </div>`).join('');
}

// ════════════════════ TABLE ════════════════════
let filters = { scripts:false, refs:false };
function setSort(f) {
  const s=document.getElementById('sort');
  if(s.value===f){ const d=document.getElementById('dir'); d.value=d.value==='desc'?'asc':'desc'; }
  else s.value=f;
  render();
}
function render() {
  const q   = document.getElementById('search').value.toLowerCase();
  const srt = document.getElementById('sort').value;
  const dir = document.getElementById('dir').value;
  const cat = document.getElementById('cat-filter').value;
  const tier= document.getElementById('tier-filter').value;

  let data = SKILLS.filter(s => {
    if(q && !s.name.includes(q) && !s.description.toLowerCase().includes(q)) return false;
    if(cat && s.category!==cat) return false;
    if(tier && s.tier!==tier) return false;
    return true;
  });

  const key = {usage:'usage',updated:'updated_ts',created:'created_ts',last_used:'last_used_ts',name:'name'}[srt]||'usage';
  data.sort((a,b)=>{
    const av=a[key],bv=b[key];
    if(typeof av==='string') return dir==='asc'?av.localeCompare(bv):bv.localeCompare(av);
    return dir==='asc'?av-bv:bv-av;
  });

  document.getElementById('stat-bar').innerHTML =
    `显示 <span>${data.length}</span> / ${SKILLS.length} · 总调用 <span>${data.reduce((a,s)=>a+s.usage,0).toLocaleString()}</span>`;

  const tbody=document.getElementById('tbody');
  if(!data.length){ tbody.innerHTML=''; document.getElementById('no-res').style.display='block'; return; }
  document.getElementById('no-res').style.display='none';
  tbody.innerHTML = data.map(s=>{
    const bw = Math.max(2, Math.round(s.usage/MAX_USAGE*100));
    const cc = CAT_COLORS[s.category]||'#475569';
    return `<tr>
      <td><span class="name">${s.name}</span></td>
      <td><span class="desc" title="${s.description}">${s.description||'—'}</span></td>
      <td><span class="cat-badge" style="background:${cc}22;color:${cc}">${s.category}</span></td>
      <td><div class="usage-wrap">
        <div class="u-bar" style="width:80px"><div class="u-fill" style="width:${bw}%"></div></div>
        <span class="u-num">${s.usage.toLocaleString()}</span>
      </div></td>
      <td><span class="date">${s.last_used}</span></td>
      <td><span class="date">${s.updated}</span></td>
      <td><span class="tier-badge tier-${s.tier}">${s.tier}</span></td>
    </tr>`;
  }).join('');
}

      ${wf.steps.map((step,i) => `
