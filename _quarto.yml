project:
  type: website
  output-dir: docs

website:
  title: "Chen's Topology Notes"
  description: "Personal academic website exploring the beautiful world of topology."
  
  # 顶部导航栏
  navbar:
    background: dark
    right:
      - href: index.qmd
        text: Home
      - href: research.qmd
        text: Research
      - href: notes.qmd
        text: Notes
      - href: gallery.qmd
        text: Gallery
      - icon: github
        href: https://github.com/cyw6130
      - icon: envelope
        href: mailto:your.email@university.edu

  # 页脚
  page-footer:
    background: dark
    left: "© 2025 Chen · Mathematics & Topology"
    center:
      - icon: github
        href: https://github.com/cyw6130
      - icon: twitter
        href: https://twitter.com
    right: "Built with Quarto"

  # 侧边栏
  sidebar:
    style: "docked"
    search: true
    collapse-level: 1
    contents:
      - section: "Notes"
        contents:
          - href: notes.qmd
            text: "Overview"
          - section: "Quantum Invariants"
            contents:
              - notes/turaev-viro.qmd
              - notes/Khovanov_homology.qmd

format:
  html:
    theme:
      light: 
        - flatly
        - custom.scss
      dark: 
        - darkly
        - custom-dark.scss
    highlight-style: github
    toc: true
    toc-location: left
    toc-title: "Contents"
    smooth-scroll: true
    mainfont: "Source Serif Pro"
    monofont: "JetBrains Mono"


