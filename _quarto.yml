project:
  type: website
  output-dir: docs
  resources:
    - tools/skill-manager.html

website:
  title: "Chen 的拓扑笔记"
  description: "用直觉感受数学,用严谨证明想法"
  
  # 顶部导航栏
  navbar:
    background: dark
    right:
      - href: index.qmd
        text: Home
      # - href: pages/research.qmd
      #   text: Research
      - href: pages/notes.qmd
        text: Notes
      - href: pages/translations.qmd
        text: Translations
      - href: pages/gallery.qmd
        text: Gallery
      - icon: github
        href: https://github.com/cyw6130
      - icon: envelope
        href: mailto:2120240050@nankai.edu.cn

  # 页脚
  page-footer:
    background: dark
    left: "© 2026 Chen · 数学与拓扑"
    center:
      - icon: github
        href: https://github.com/cyw6130
    right: "Built with Quarto"

  # 侧边栏
  sidebar:
    style: "docked"
    search: true
    collapse-level: 1
    contents:
      # - href: notes/Khovanov_homology.pdf
      #   text: "Download PDF"
      - section: "Notes"
        contents:
          - href: pages/notes.qmd
            text: "Overview"
          - section: "Quantum Invariants"
            contents:
              - notes/Khovanov_homology.qmd
          - section: "Four Manifolds"
            contents:
              - notes/poincare-conjecture-and-manifold-topological-classification.qmd
              - notes/intersection-form-of-4-manifold.qmd
          - section: "High-dimensional Manifolds"
            contents:
              - notes/h_cobordism_4.qmd
              - notes/bernoulli.qmd
          - section: "AI for Knot"
            contents:
              - notes/microgpt-math-impl-compare.qmd
format:
  html:
    html-math-method: katex
    theme:
      light: flatly
      dark: darkly
    highlight-style: github
    toc: true
    toc-location: left
    toc-title: "Contents"
    smooth-scroll: true
    mainfont: "Source Serif Pro"
    monofont: "JetBrains Mono"
    include-in-header:
      - includes/lazy-image-loading.html
    filters:
      - filters/lazy-images.lua
      - filters/use-webp-html.lua
